<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Digitali - ArcheoApp</title>
    <style>
        :root {
            --primary-pink: #fce4ec;
            --accent-pink: #f06292;
            --dark-text: #4a4a4a;
            --white: #ffffff;
            --bg-color: #fff5f8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--dark-text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navigazione e Header */
        .header-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .search-bar {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background: var(--white);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        .breadcrumb {
            margin-top: 15px;
            font-size: 14px;
            color: var(--accent-pink);
            cursor: pointer;
            font-weight: bold;
        }

        /* Griglia dei Box */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .box {
            background: var(--white);
            padding: 30px 15px;
            border-radius: 20px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid var(--primary-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
        }

        .box:active { transform: scale(0.95); }
        .box-icon { font-size: 24px; margin-bottom: 10px; }

        /* Bottone Floating + */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background-color: var(--accent-pink);
            color: white;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(240, 98, 146, 0.4);
            cursor: pointer;
            z-index: 999;
        }

        /* Stile Modal (Form) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
        }

        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            max-height: 90%;
            border-radius: 30px 30px 0 0;
            padding: 25px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; color: var(--accent-pink); }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--primary-pink); font-size: 16px; box-sizing: border-box; }
        input[readonly] { background-color: #f2f2f2; color: #888; }

        .rapporti-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-rapporto { padding: 10px; border-radius: 10px; border: 1px solid var(--accent-pink); background: white; color: var(--accent-pink); cursor: pointer; font-size: 12px; }
        
        .chip-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .chip { background: var(--primary-pink); padding: 5px 10px; border-radius: 15px; font-size: 13px; display: flex; align-items: center; }
        .close-chip { margin-left: 8px; color: red; font-weight: bold; cursor: pointer; }

        .btn-save { width: 100%; padding: 15px; background: var(--accent-pink); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-container">
        <input type="text" class="search-bar" placeholder="Cerca US...">
        <div id="breadcrumb" class="breadcrumb" onclick="resetNav()">Home</div>
    </div>

    <div id="main-grid" class="grid-container"></div>

    <div id="add-button" class="fab" onclick="openForm()">+</div>

    <div id="form-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="text-align:center; color: var(--accent-pink);">Nuova US</h2>
            
            <div class="form-group">
                <label>Contesto (Sola Lettura)</label>
                <input type="text" id="form-context" readonly>
            </div>

            <div class="form-group">
                <label>Numero US</label>
                <input type="number" id="num_us" placeholder="Es: 100">
            </div>

            <div class="form-group">
                <label>Tipo US</label>
                <select id="tipo_us">
                    <option value="piano">Piano</option>
                    <option value="taglio">Taglio</option>
                    <option value="riempimento">Riempimento</option>
                    <option value="accumulo">Accumulo</option>
                    <option value="installazione">Installazione</option>
                </select>
            </div>

            <div class="form-group">
                <label>Operatore</label>
                <select id="operatore">
                    <option value="Archeologo 1">Archeologo 1</option>
                    <option value="Archeologo 2">Archeologo 2</option>
                </select>
            </div>

            <div class="form-group">
                <label>Foto Effettuata?</label>
                <input type="checkbox" id="check_foto" style="width: auto;">
                <input type="file" id="file_foto" accept="image/*" capture="camera" style="margin-top: 10px;">
            </div>

            <label>Rapporti Stratigrafici</label>
            <div class="rapporti-grid">
                <button type="button" class="btn-rapporto" onclick="addRapporto('Copre')">Copre</button>
                <button type="button" class="btn-rapporto" onclick="addRapporto('È coperto da')">È coperto da</button>
                <button type="button" class="btn-rapporto" onclick="addRapporto('Riempie')">Riempie</button>
                <button type="button" class="btn-rapporto" onclick="addRapporto('È riempito da')">È riempito da</button>
                <button type="button" class="btn-rapporto" onclick="addRapporto('Taglia')">Taglia</button>
                <button type="button" class="btn-rapporto" onclick="addRapporto('È tagliato da')">È tagliato da</button>
            </div>
            <div id="chips-area" class="chip-container"></div>

            <div class="form-group" style="margin-top:15px;">
                <label>Descrizione / Interpretazione</label>
                <textarea id="descrizione" rows="4"></textarea>
            </div>

            <button class="btn-save" onclick="salvaDati()">INVIA DATI</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Annulla</button>
        </div>
    </div>

    <script>
        const dataStruttura = {
            "Asingeran 2022": {
                "Cantiere E": ["Q1", "Q2"],
                "Cantiere F": ["Q1"]
            },
            "Asingeran 2023": {
                "Cantiere G": ["Q1", "Q3"]
            }
        };

        let currentLevel = "HOME";
        let path = { scavo: "", cantiere: "", quadrante: "" };
        let rapportiDati = [];

        const grid = document.getElementById('main-grid');
        const breadcrumb = document.getElementById('breadcrumb');
        const addButton = document.getElementById('add-button');
        const modal = document.getElementById('form-modal');
        const chipsArea = document.getElementById('chips-area');

        function render() {
            grid.innerHTML = "";
            if (currentLevel === "HOME") {
                breadcrumb.innerText = "Home";
                addButton.style.display = "none";
                Object.keys(dataStruttura).forEach(s => createBox(s, "🏗️", () => selectScavo(s)));
            } 
            else if (currentLevel === "CANTIERE") {
                breadcrumb.innerText = `Home > ${path.scavo}`;
                addButton.style.display = "none";
                Object.keys(dataStruttura[path.scavo]).forEach(c => createBox(c, "🚧", () => selectCantiere(c)));
            } 
            else if (currentLevel === "QUADRANTE") {
                breadcrumb.innerText = `Home > ${path.scavo} > ${path.cantiere}`;
                addButton.style.display = "none";
                dataStruttura[path.scavo][path.cantiere].forEach(q => createBox(q, "🟦", () => selectQuadrante(q)));
            }
            else if (currentLevel === "US_LIST") {
                breadcrumb.innerText = `${path.scavo} > ${path.cantiere} > ${path.quadrante}`;
                addButton.style.display = "flex";
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>Nessuna US presente. Clicca + per aggiungere.</p>";
            }
        }

        function createBox(text, icon, onClick) {
            const div = document.createElement('div');
            div.className = 'box';
            div.innerHTML = `<div class="box-icon">${icon}</div><div>${text}</div>`;
            div.onclick = onClick;
            grid.appendChild(div);
        }

        function selectScavo(s) { path.scavo = s; currentLevel = "CANTIERE"; render(); }
        function selectCantiere(c) { path.cantiere = c; currentLevel = "QUADRANTE"; render(); }
        function selectQuadrante(q) { path.quadrante = q; currentLevel = "US_LIST"; render(); }
        function resetNav() { currentLevel = "HOME"; path = {scavo:"", cantiere:"", quadrante:""}; render(); }

        function openForm() {
            document.getElementById('form-context').value = `${path.scavo} | ${path.cantiere} | ${path.quadrante}`;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
            rapportiDati = [];
            renderChips();
        }

        function addRapporto(tipo) {
            const num = prompt(`Inserisci il numero US che ${tipo.toLowerCase()}:`);
            if (num) {
                rapportiDati.push({ id: Date.now(), tipo, num });
                renderChips();
            }
        }

        function renderChips() {
            chipsArea.innerHTML = "";
            rapportiDati.forEach(r => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerHTML = `${r.tipo}: ${r.num} <span class="close-chip" onclick="removeRapporto(${r.id})">✕</span>`;
                chipsArea.appendChild(chip);
            });
        }

     function removeRapporto(id) {
            rapportiDati = rapportiDati.filter(r => r.id !== id);
            renderChips();
        }

        function salvaDati() {
            const scriptURL = 'https://script.google.com/macros/s/AKfycbx0ih26TqMcqg6YGns5BQDP7TJ9PCDRV5ew8wsDXo2HFW7WwmIH3yrSXNJr3SNdb6iM/exec';
            
            const btn = document.querySelector('.btn-save');
            const originalText = btn.innerText;
            btn.innerText = "Invio in corso...";
            btn.disabled = true;

            const payload = {
                scavo: path.scavo,
                cantiere: path.cantiere,
                quadrante: path.quadrante,
                numero_us: document.getElementById('num_us').value,
                tipo_us: document.getElementById('tipo_us').value,
                operatore: document.getElementById('operatore').value,
                foto: document.getElementById('check_foto').checked,
                rapporti: rapportiDati,
                descrizione: document.getElementById('descrizione').value
            };

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("Perfetto! US salvata correttamente nel database.");
                btn.innerText = originalText;
                btn.disabled = false;
                // Pulizia del form dopo l'invio
                document.getElementById('num_us').value = "";
                document.getElementById('descrizione').value = "";
                rapportiDati = [];
                renderChips();
                closeModal();
            })
            .catch(error => {
                console.error('Errore:', error);
                alert("Ops! Qualcosa è andato storto nell'invio.");
                btn.innerText = originalText;
                btn.disabled = false;
            });
        }

        // Questo comando fa partire l'app!
        render();
    </script>
</body>
</html>
