<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Digitali - ArcheoApp</title>
    <style>
        :root {
            --primary-pink: #fce4ec;
            --accent-pink: #f06292;
            --dark-text: #4a4a4a;
            --white: #ffffff;
            --bg-color: #fff5f8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--dark-text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Barra di ricerca e Navigazione */
        .header-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .search-bar {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background: var(--white);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        .breadcrumb {
            margin-top: 15px;
            font-size: 14px;
            color: var(--accent-pink);
            cursor: pointer;
        }

        /* Griglia dei Box */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .box {
            background: var(--white);
            padding: 30px 15px;
            border-radius: 20px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid var(--primary-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
        }

        .box:active {
            transform: scale(0.95);
        }

        .box-icon {
            font-size: 24px;
            margin-bottom: 10px;
        }

        /* Bottone Floating + */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background-color: var(--accent-pink);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(240, 98, 146, 0.4);
            cursor: pointer;
            display: none; /* Nascosto finché non siamo nel quadrante */
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header-container">
        <input type="text" class="search-bar" placeholder="Cerca US...">
        <div id="breadcrumb" class="breadcrumb" onclick="resetNav()">Home</div>
    </div>

    <div id="main-grid" class="grid-container">
        </div>

    <div id="add-button" class="fab" onclick="openForm()">+</div>

    <script>
        // Simulazione dati (Poi verranno da Google Sheets)
        const dataStruttura = {
            "Asingeran 2022": {
                "Cantiere E": ["Q1", "Q2"],
                "Cantiere F": ["Q1"]
            },
            "Asingeran 2023": {
                "Cantiere G": ["Q1", "Q3"]
            }
        };

        let currentLevel = "HOME";
        let path = { scavo: "", cantiere: "", quadrante: "" };

        const grid = document.getElementById('main-grid');
        const breadcrumb = document.getElementById('breadcrumb');
        const addButton = document.getElementById('add-button');

        function render() {
            grid.innerHTML = "";
            
            if (currentLevel === "HOME") {
                breadcrumb.innerText = "Home";
                addButton.style.display = "none";
                Object.keys(dataStruttura).forEach(scavo => {
                    createBox(scavo, "🏗️", () => selectScavo(scavo));
                });
            } 
            else if (currentLevel === "CANTIERE") {
                breadcrumb.innerText = `Home > ${path.scavo}`;
                addButton.style.display = "none";
                Object.keys(dataStruttura[path.scavo]).forEach(cantiere => {
                    createBox(cantiere, "🚧", () => selectCantiere(cantiere));
                });
            } 
            else if (currentLevel === "QUADRANTE") {
                breadcrumb.innerText = `Home > ${path.scavo} > ${path.cantiere}`;
                addButton.style.display = "none";
                dataStruttura[path.scavo][path.cantiere].forEach(quad => {
                    createBox(quad, "🟦", () => selectQuadrante(quad));
                });
            }
            else if (currentLevel === "US_LIST") {
                breadcrumb.innerText = `${path.scavo} > ${path.cantiere} > ${path.quadrante}`;
                addButton.style.display = "flex";
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>Nessuna US presente. Clicca + per aggiungere.</p>";
            }
        }

        function createBox(text, icon, onClick) {
            const div = document.createElement('div');
            div.className = 'box';
            div.innerHTML = `<div class="box-icon">${icon}</div><div>${text}</div>`;
            div.onclick = onClick;
            grid.appendChild(div);
        }

        function selectScavo(s) { path.scavo = s; currentLevel = "CANTIERE"; render(); }
        function selectCantiere(c) { path.cantiere = c; currentLevel = "QUADRANTE"; render(); }
        function selectQuadrante(q) { path.quadrante = q; currentLevel = "US_LIST"; render(); }
        function resetNav() { currentLevel = "HOME"; path = {scavo:"", cantiere:"", quadrante:""}; render(); }

        function openForm() {
            alert(`Apertura form per: ${path.scavo}, ${path.cantiere}, ${path.quadrante}`);
            // Qui collegheremo il form reale nel prossimo step
        }

        // Inizializzazione
        render();
    </script>
</body>
</html>
