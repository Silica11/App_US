<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Digitali - ArcheoApp</title>
    <style>
        :root {
            --primary-pink: #fce4ec;
            --accent-pink: #f06292;
            --dark-text: #4a4a4a;
            --white: #ffffff;
            --bg-color: #fff5f8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--dark-text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .search-bar {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background: var(--white);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        .breadcrumb {
            margin-top: 15px;
            font-size: 14px;
            color: var(--accent-pink);
            cursor: pointer;
            font-weight: bold;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .box {
            background: var(--white);
            padding: 30px 15px;
            border-radius: 20px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid var(--primary-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            position: relative; /* Per posizionare la X */
        }

        /* La X tonda per eliminare */
        .delete-btn {
            position: absolute;
            top: -10px;
            left: -10px;
            background: #ff5252;
            color: white;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 10;
            border: 2px solid white;
        }

        .box:active { transform: scale(0.95); }
        .box-icon { font-size: 24px; margin-bottom: 10px; }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background-color: var(--accent-pink);
            color: white;
            border-radius: 50%;
            display: flex; /* Sempre flessibile, la controlliamo con il render */
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(240, 98, 146, 0.4);
            cursor: pointer;
            z-index: 999;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
        }

        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            max-height: 90%;
            border-radius: 30px 30px 0 0;
            padding: 25px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; color: var(--accent-pink); }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--primary-pink); font-size: 16px; box-sizing: border-box; }
        input[readonly] { background-color: #f2f2f2; color: #888; }

        .rapporti-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-rapporto { padding: 10px; border-radius: 10px; border: 1px solid var(--accent-pink); background: white; color: var(--accent-pink); cursor: pointer; font-size: 12px; }
        
        .chip-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .chip { background: var(--primary-pink); padding: 5px 10px; border-radius: 15px; font-size: 13px; display: flex; align-items: center; }
        .close-chip { margin-left: 8px; color: red; font-weight: bold; cursor: pointer; }

        .btn-save { width: 100%; padding: 15px; background: var(--accent-pink); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-container">
        <input type="text" class="search-bar" placeholder="Cerca US...">
        <div id="breadcrumb" class="breadcrumb" onclick="resetNav()">Home</div>
    </div>

    <div id="main-grid" class="grid-container"></div>

    <div id="add-button" class="fab" onclick="handleFabClick()">+</div>

    <div id="form-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="text-align:center; color: var(--accent-pink);">Scheda US</h2>
            
            <div class="form-group">
                <label>Contesto (Sola Lettura)</label>
                <input type="text" id="form-context" readonly>
            </div>

            <div class="form-group">
                <label>Numero US</label>
                <input type="number" id="num_us" placeholder="Es: 100">
            </div>

            <div class="form-group">
                <label>Tipo US</label>
                <select id="tipo_us">
                    <option value="piano">Piano</option>
                    <option value="taglio">Taglio</option>
                    <option value="riempimento">Riempimento</option>
                    <option value="accumulo">Accumulo</option>
                    <option value="installazione">Installazione</option>
                </select>
            </div>

            <div class="form-group">
                <label>Operatore</label>
                <select id="operatore">
                    <option value="Archeologo 1">Archeologo 1</option>
                    <option value="Archeologo 2">Archeologo 2</option>
                </select>
            </div>

            <div class="form-group">
                <label>Foto Effettuata?</label>
                <input type="checkbox" id="check_foto" style="width: auto;">
                <input type="file" id="file_foto" accept="image/*" capture="camera" style="margin-top: 10px;">
            </div>

            <label>Rapporti Stratigrafici</label>
            <div class="rapporti-grid">
                <button type="button" class="btn-rapporto" onclick="addRapporto('Copre')">Copre</button>
                <button type="button" class="btn-rapporto" onclick="addRapporto('È coperto da')">È coperto da</button>
                <button type="button" class="btn-rapporto" onclick="addRapporto('Riempie')">Riempie</button>
                <button type="button" class="btn-rapporto" onclick="addRapporto('È riempito da')">È riempito da</button>
                <button type="button" class="btn-rapporto" onclick="addRapporto('Taglia')">Taglia</button>
                <button type="button" class="btn-rapporto" onclick="addRapporto('È tagliato da')">È tagliato da</button>
            </div>
            <div id="chips-area" class="chip-container"></div>

            <div class="form-group" style="margin-top:15px;">
                <label>Descrizione (Dati oggettivi)</label>
                <textarea id="descrizione" rows="3" placeholder="Es: Terreno sabbioso bruno..."></textarea>
            </div>

            <div class="form-group">
                <label>Interpretazione (Dati soggettivi)</label>
                <textarea id="interpretazione" rows="3" placeholder="Es: Riempimento di buca..."></textarea>
            </div>

            <button class="btn-save" onclick="salvaDati()">INVIA DATI</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Annulla</button>
        </div>
    </div>

    <script>
      // URL UFFICIALE E AGGIORNATO
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwrcw9ubYVb83iuzwCCg5Dsg_Bb6hwktmyaJ2sj5hcxWOZEt4rmA8M884bbaSeNhb8r/exec';

        let dataStruttura = {};
        let currentLevel = "HOME";
        let path = { scavo: "", cantiere: "", quadrante: "" };
        let rapportiDati = [];
        let databaseLocale = [];

        const grid = document.getElementById('main-grid');
        const breadcrumb = document.getElementById('breadcrumb');
        const addButton = document.getElementById('add-button');
        const modal = document.getElementById('form-modal');
        const chipsArea = document.getElementById('chips-area');

        // SCARICA I DATI AL PRIMO AVVIO E AD OGNI AGGIORNAMENTO
        async function caricaDatiDalDatabase() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                // Popola il database locale (US e Struttura)
                databaseLocale = data.us || [];
                if (data.strutturaObj && Object.keys(data.strutturaObj).length > 0) {
                    dataStruttura = data.strutturaObj;
                }
                render(); 
            } catch (e) {
                console.error("Errore caricamento dati:", e);
            }
        }

        // SALVA LA STRUTTURA OGNI VOLTA CHE AGGIUNGI O ELIMINI QUALCOSA
        function salvaStrutturaInCloud() {
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "SAVE_STRUTTURA", struttura: dataStruttura })
            });
        }

        // ELIMINA UNA US
        function eliminaUS(numero_us) {
            if(!confirm(`Vuoi davvero eliminare l'US ${numero_us}?`)) return;
            
            // Nascondila subito dalla schermata
            databaseLocale = databaseLocale.filter(us => String(us.Numero_US) !== String(numero_us));
            render();

            // Mandala a cancellare sul Cloud
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    action: "DELETE_US", scavo: path.scavo, cantiere: path.cantiere, quadrante: path.quadrante, numero_us: numero_us
                })
            }).then(() => caricaDatiDalDatabase());
        }

        function render() {
            grid.innerHTML = "";
            addButton.style.display = "flex"; 

            // --- NUOVA GESTIONE BRICIOLE DI PANE CLICCABILI ---
            let bcHTML = `<span onclick="event.stopPropagation(); resetNav()" style="cursor:pointer; text-decoration:underline;">Home</span>`;
            if (currentLevel === "CANTIERE" || currentLevel === "QUADRANTE" || currentLevel === "US_LIST") {
                bcHTML += ` > <span onclick="event.stopPropagation(); selectScavo('${path.scavo}')" style="cursor:pointer; text-decoration:underline;">${path.scavo}</span>`;
            }
            if (currentLevel === "QUADRANTE" || currentLevel === "US_LIST") {
                bcHTML += ` > <span onclick="event.stopPropagation(); selectCantiere('${path.cantiere}')" style="cursor:pointer; text-decoration:underline;">${path.cantiere}</span>`;
            }
            if (currentLevel === "US_LIST") {
                bcHTML += ` > <span style="font-weight:bold;">${path.quadrante}</span>`;
            }
            breadcrumb.innerHTML = bcHTML;
            // --------------------------------------------------

            if (currentLevel === "HOME") {
                if (Object.keys(dataStruttura).length === 0) grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: gray;'>Nessuno scavo. Clicca + per creare.</p>";
                Object.keys(dataStruttura).forEach(s => createBox(s, "🏗️", () => selectScavo(s), () => deleteItem(s)));
            } 
            else if (currentLevel === "CANTIERE") {
                if (Object.keys(dataStruttura[path.scavo] || {}).length === 0) grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: gray;'>Nessun cantiere. Clicca + per creare.</p>";
                Object.keys(dataStruttura[path.scavo]).forEach(c => createBox(c, "🚧", () => selectCantiere(c), () => deleteItem(c)));
            } 
            else if (currentLevel === "QUADRANTE") {
                if ((dataStruttura[path.scavo][path.cantiere] || []).length === 0) grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: gray;'>Nessun quadrante. Clicca + per creare.</p>";
                dataStruttura[path.scavo][path.cantiere].forEach(q => createBox(q, "🟦", () => {
                    path.quadrante = q; 
                    currentLevel = "US_LIST"; 
                    render(); 
                    caricaDatiDalDatabase(); 
                }, () => deleteItem(q)));
            }
            else if (currentLevel === "US_LIST") {
                const usFiltrate = databaseLocale.filter(us => 
                    String(us.Scavo || "").trim().toLowerCase() === String(path.scavo).trim().toLowerCase() && 
                    String(us.Cantiere || "").trim().toLowerCase() === String(path.cantiere).trim().toLowerCase() && 
                    String(us.Quadrante || "").trim().toLowerCase() === String(path.quadrante).trim().toLowerCase()
                );

                if (usFiltrate.length === 0) {
                    grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: gray;'>Nessuna US trovata. Clicca +</p>";
                } else {
                    usFiltrate.forEach(us => {
                        const div = document.createElement('div');
                        div.className = 'box';
                        div.style.position = "relative"; 
                        div.style.aspectRatio = "auto";
                        div.style.height = "50px"; 
                        div.style.padding = "5px 15px";
                        div.style.flexDirection = "row";
                        div.style.justifyContent = "space-between";
                        div.style.border = "1px dashed var(--accent-pink)";
                        div.style.background = "#fff";
                        
                        const xBtn = document.createElement('div');
                        xBtn.className = 'delete-btn';
                        xBtn.innerText = '✕';
                        xBtn.onclick = (e) => { e.stopPropagation(); eliminaUS(us.Numero_US); };
                        
                        const textDiv = document.createElement('div');
                        textDiv.style.display = "flex"; textDiv.style.justifyContent = "space-between"; textDiv.style.width = "100%"; textDiv.style.alignItems = "center";
                        textDiv.innerHTML = `
                            <div style="display:flex; align-items:center; gap:10px;">
                                <span style="font-size:10px; color:var(--accent-pink); font-weight:bold;">US</span>
                                <span style="font-size:18px; font-weight:bold;">${us.Numero_US}</span>
                            </div>
                            <div style="font-size:11px; color:gray;">${us.Tipo_US}</div>
                        `;
                        
                        div.appendChild(xBtn);
                        div.appendChild(textDiv);
                        div.onclick = () => openForm(us);
                        grid.appendChild(div);
                    });
                }
            }
        }

        function createBox(text, icon, onClick, onDelete) {
            const div = document.createElement('div');
            div.className = 'box';
            
            const xBtn = document.createElement('div');
            xBtn.className = 'delete-btn';
            xBtn.innerText = '✕';
            xBtn.onclick = (e) => { 
                e.stopPropagation(); 
                if(confirm(`Eliminare ${text}?`)) onDelete(); 
            };
            
            div.innerHTML = `<div class="box-icon">${icon}</div><div>${text}</div>`;
            div.appendChild(xBtn);
            div.onclick = onClick;
            grid.appendChild(div);
        }

        // TASTO PIÙ INTELLIGENTE
        function handleFabClick() {
            if (currentLevel === "US_LIST") {
                openForm(); // Apre la scheda della nuova US
                return;
            }

            const nuovo = prompt("Inserisci il nome del nuovo elemento:");
            if (!nuovo || nuovo.trim() === "") return;
            const nomePulito = nuovo.trim();

            // Aggiunge Scavi/Cantieri/Quadranti
            if (currentLevel === "HOME") {
                if(!dataStruttura[nomePulito]) dataStruttura[nomePulito] = {};
            } else if (currentLevel === "CANTIERE") {
                if(!dataStruttura[path.scavo][nomePulito]) dataStruttura[path.scavo][nomePulito] = [];
            } else if (currentLevel === "QUADRANTE") {
                if(!dataStruttura[path.scavo][path.cantiere].includes(nomePulito)) dataStruttura[path.scavo][path.cantiere].push(nomePulito);
            }
            
            render();
            salvaStrutturaInCloud(); // Lo scrive nel foglio Google "Struttura"
        }

        function deleteItem(item) {
            if (currentLevel === "HOME") {
                delete dataStruttura[item];
            } else if (currentLevel === "CANTIERE") {
                delete dataStruttura[path.scavo][item];
            } else if (currentLevel === "QUADRANTE") {
                dataStruttura[path.scavo][path.cantiere] = dataStruttura[path.scavo][path.cantiere].filter(q => q !== item);
            }
            render();
            salvaStrutturaInCloud(); // Cancella l'elemento dal foglio Google "Struttura"
        }

        function selectScavo(s) { path.scavo = s; currentLevel = "CANTIERE"; render(); }
        function selectCantiere(c) { path.cantiere = c; currentLevel = "QUADRANTE"; render(); }
        function resetNav() { currentLevel = "HOME"; path = {scavo:"", cantiere:"", quadrante:""}; render(); caricaDatiDalDatabase(); }

        function openForm(dati = null) {
            document.getElementById('form-context').value = `${path.scavo} | ${path.cantiere} | ${path.quadrante}`;
            const btn = document.querySelector('.btn-save');
            rapportiDati = [];
            
            if(dati) {
                const mapping = { "Copre": dati.Copre, "È coperto da": dati.Coperto_da, "Taglia": dati.Taglia, "È tagliato da": dati.Tagliato_da, "Riempie": dati.Riempie, "È riempito da": dati.Riempito_da };
                Object.keys(mapping).forEach(tipo => {
                    if (mapping[tipo]) { mapping[tipo].toString().split(',').forEach(num => { if(num.trim()) rapportiDati.push({ id: Math.random(), tipo: tipo, num: num.trim() }); }); }
                });
                document.getElementById('num_us').value = dati.Numero_US;
                document.getElementById('tipo_us').value = dati.Tipo_US;
                document.getElementById('descrizione').value = dati.Descrizione;
                document.getElementById('interpretazione').value = dati.Interpretazione;
                btn.innerText = "AGGIORNA DATI";
            } else {
                document.getElementById('num_us').value = "";
                document.getElementById('descrizione').value = "";
                document.getElementById('interpretazione').value = "";
                btn.innerText = "INVIA DATI";
            }
            renderChips(); 
            modal.style.display = 'flex';
        }

        function closeModal() { modal.style.display = 'none'; }

        function addRapporto(tipo) {
            const num = prompt(`Inserisci il numero US che ${tipo.toLowerCase()}:`);
            if (num) { rapportiDati.push({ id: Date.now(), tipo, num }); renderChips(); }
        }

        function renderChips() {
            chipsArea.innerHTML = "";
            rapportiDati.forEach(r => {
                const chip = document.createElement('div'); chip.className = 'chip';
                chip.innerHTML = `${r.tipo}: ${r.num} <span class="close-chip" onclick="removeRapporto(${r.id})">✕</span>`; chipsArea.appendChild(chip);
            });
        }

        function removeRapporto(id) { rapportiDati = rapportiDati.filter(r => r.id !== id); renderChips(); }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error);
        });

        async function salvaDati() {
            const btn = document.querySelector('.btn-save');
            btn.innerText = "Invio in corso...";
            btn.disabled = true;

            let fileData = null;
            const fileInput = document.getElementById('file_foto');
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0]; const base64 = await toBase64(file);
                fileData = { base64: base64.split(',')[1], type: file.type };
            }

            const payload = {
                action: "SAVE_US", // Spiega allo script cosa fare
                scavo: path.scavo, cantiere: path.cantiere, quadrante: path.quadrante,
                numero_us: document.getElementById('num_us').value, tipo_us: document.getElementById('tipo_us').value,
                operatore: document.getElementById('operatore').value, fotoSpunta: document.getElementById('check_foto').checked,
                fotoFile: fileData, rapporti: rapportiDati, descrizione: document.getElementById('descrizione').value, interpretazione: document.getElementById('interpretazione').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("US Salvata con successo!");
                btn.disabled = false;
                btn.innerText = "INVIA DATI";
                closeModal();
                caricaDatiDalDatabase(); // Ricarica tutto
            })
            .catch(error => {
                alert("Errore nell'invio.");
                btn.disabled = false;
                btn.innerText = "INVIA DATI";
            });
        }

        // CARICA I DATI APPENA SI APRE L'APP
        caricaDatiDalDatabase();
    </script>
</body>
</html>
